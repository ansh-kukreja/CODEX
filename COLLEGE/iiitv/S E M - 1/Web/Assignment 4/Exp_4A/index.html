<html> 
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Assignment 4 - Gauraansh Gaur</title>
        <link href="Mycss.css" rel="stylesheet" type="text/css"/>
    </head>
    <body>
        <table>
            <tr>
                <td id="controls">
				<form name="names" onchange="nameChanged()">
                        <label>First name: <input type="text" name="firstname" size="15"></label><br>
                        <label>Last name: <input type="text" name="lastname" size="15"></label>
                </form>

                <form name="fontAlignment" onchange="alignmentChanged()">
                    <label for="textAlignment">Alignment: </label>
                    <select name="textAlignment" id="textAlignment">
                        <option value="left" selected>Left</option>
                        <option value="center">Center</option>
                        <option value="right">Right</option>
                        <option value="justify">Justified</option>
                    </select>
                </form>

                <form name="fontSize" onchange="sizeChanged()">
                    <label for="fontSize">Font size: </label>
                    <div class="rangeBar">
                        <span class="rangeEdges">50%</span>
                        <input type="range" id="fontSize" min="50" max="200" value="100">
                        <span class="rangeEdges">200%</span>
                    </div>
                    
                    <span id="sizeValue">100%</span>
                </form>
				
                
                </td>
                <td id="target">
                    <div id="hello">Hello, {name}!</div>
                    <div id="welcome">Welcome to Web Programming Lab!</div>
                </td>
            </tr>
        </table>
        <script src="Myjs.js" type="text/javascript"></script>
    </body>
</html>
