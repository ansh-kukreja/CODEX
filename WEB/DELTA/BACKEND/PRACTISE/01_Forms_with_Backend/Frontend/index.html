<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h2>GET Request Form</h2>
    <form method="get" action="http://localhost:8080/register">
        <input placeholder="Enter username" type="text" name="user">
        <input placeholder="Enter password" type="password" name="password">
        <button>Submit</button>
    </form>
    <hr/>
    <h2>POST Request Form</h2>
    <form method="post" action="http://localhost:8080/register">
        <input placeholder="Enter username" type="text" name="user">
        <input placeholder="Enter password" type="password" name="password">
        <button>Submit</button>
    </form>
</body>
</html>
